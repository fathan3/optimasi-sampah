<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default('OptiPro') }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 35%, #0c4a6e 70%, #0891b2 100%);
        }
        .glass {
            backdrop-filter: blur(18px);
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.10);
        }
        .card-hover {
            transition: .3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
        }
    </style>
</head>

<body class="min-h-screen text-white">

    <!-- Efek background di belakang -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-0 w-96 h-96 bg-cyan-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-500/20 rounded-full blur-3xl"></div>
    </div>

    <div class="relative max-w-7xl mx-auto px-6 py-10">

        <!-- Header Utama -->
        <header class="mb-10">
            <div class="glass rounded-3xl shadow-2xl p-8">
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 rounded-2xl bg-cyan-500 flex items-center justify-center text-3xl shadow-lg">
                        ♻️
                    </div>
                    <div>
                        <!-- <h1 class="text-4xl font-bold">OptiPro</h1>
                        <p class="text-slate-300 mt-2">Sistem Optimasi Penjadwalan Material Berbasis Dynamic Programming & Round Robin</p> -->
                    </div>
                </div>
            </div>
        </header>

        <!-- Tempat buat nampilin konten dinamis -->
        <main>
            {% block content %}{% endblock %}
        </main>

    </div>

</body>
</html>
