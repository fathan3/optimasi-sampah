<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default('OptiPro') }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            50: '#fafafa',
                            100: '#f4f4f5',
                            200: '#e4e4e7',
                            300: '#d4d4d8',
                            800: '#27272a',
                            900: '#18181b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans selection:bg-blue-100 selection:text-blue-900">
    <div class="max-w-5xl mx-auto w-full pt-12 pb-10 px-4 sm:px-6 lg:px-8 flex-grow">
        <header class="mb-10 border-b border-gray-200 pb-6">
            <div class="flex items-center space-x-3 mb-2">
                <div class="w-8 h-8 rounded bg-gray-900 flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <h1 class="text-2xl font-semibold tracking-tight text-gray-900">
                    OptiPro
                </h1>
            </div>
            <p class="text-gray-500 text-sm max-w-2xl mt-3 leading-relaxed">
                Platform komparasi untuk menentukan alokasi penjadwalan material yang optimal berdasarkan parameter kapasitas mesin dan nilai jual.
            </p>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
