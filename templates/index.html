{% extends "layout.html" %}

{% block content %}
<div class="glass rounded-3xl shadow-2xl overflow-hidden">
    <!-- Header Aplikasi -->
    <div class="px-8 py-6 border-b border-white/10">
        <h2 class="text-2xl font-bold text-white">OptiPro</h2>
        <p class="text-slate-300 mt-2">
            Atur kapasitas mesin dan material yang akan diproses untuk mendapatkan hasil produksi paling optimal.
        </p>
    </div>

    <!-- Form untuk masukin batas waktu dan material -->
    <form action="{{ url_for('process') }}" method="POST">
        <div class="p-8 border-b border-white/10">
            <label class="block text-sm font-medium text-slate-300 mb-3">
                Batas Waktu Mesin Tersedia
            </label>
            <div class="relative max-w-xs">
                <input type="number" name="max_time" value="60" class="w-full px-4 py-3 bg-white/10 border border-white/10 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-400" required>
                <span class="absolute right-4 top-3 text-slate-300">menit</span>
            </div>
        </div>

        <div class="p-8">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h3 class="text-xl font-semibold text-white">Detail Material</h3>
                    <p class="text-slate-400 text-sm">Tambahkan material yang akan diproses.</p>
                </div>
                <button type="button" id="addRowBtn" class="bg-cyan-500 hover:bg-cyan-400 text-white px-5 py-2 rounded-xl transition shadow-lg">
                    + Tambah Material
                </button>
            </div>

            <div class="overflow-x-auto rounded-2xl border border-white/10">
                <table class="w-full">
                    <thead>
                        <tr class="bg-white/5">
                            <th class="p-4 text-left text-slate-300">Material</th>
                            <th class="p-4 text-left text-slate-300">Pesanan (kg)</th>
                            <th class="p-4 text-left text-slate-300">Durasi (m/kg)</th>
                            <th class="p-4 text-left text-slate-300">Nilai Jual</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="materialTableBody">
                        <tr class="border-t border-white/10">
                            <td class="p-3">
                                <select name="name[]" required onchange="updateSpecs(this)" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white">
                                    <option value="" disabled selected>Pilih Material</option>
                                    <option value="Besi" data-time="5" data-value="10000">Besi</option>
                                    <option value="Plastik" data-time="2" data-value="5000">Plastik</option>
                                    <option value="Kaleng" data-time="3" data-value="7000">Kaleng</option>
                                    <option value="Kertas" data-time="1" data-value="3000">Kertas</option>
                                    <option value="Kaca" data-time="6" data-value="14000">Kaca</option>
                                </select>
                            </td>
                            <td class="p-3">
                                <input type="number" name="max_qty[]" required class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white">
                            </td>
                            <td class="p-3">
                                <input type="number" name="time_per_kg[]" readonly class="w-full bg-white/5 rounded-xl px-4 py-3 text-cyan-300">
                            </td>
                            <td class="p-3">
                                <input type="number" name="value_per_kg[]" readonly class="w-full bg-white/5 rounded-xl px-4 py-3 text-green-300">
                            </td>
                            <td class="p-3 text-center">
                                <button type="button" onclick="removeRow(this)" class="text-red-400 hover:text-red-300">✕</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="px-8 py-6 border-t border-white/10">
            <button type="submit" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 px-8 py-4 rounded-2xl font-semibold shadow-xl transition">
                Jalankan Optimasi
            </button>
        </div>
    </form>
</div>

<!-- Script buat nambah/hapus baris material -->
<script>
document.getElementById('addRowBtn').addEventListener('click', function() {
    const tbody = document.getElementById('materialTableBody');
    const tr = document.createElement('tr');
    tr.className = 'border-t border-white/10';
    tr.innerHTML = `
        <td class="p-3">
            <select name="name[]" required onchange="updateSpecs(this)" class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white">
                <option value="" disabled selected>Pilih Material</option>
                <option value="Besi" data-time="5" data-value="10000">Besi</option>
                <option value="Plastik" data-time="2" data-value="5000">Plastik</option>
                <option value="Kaleng" data-time="3" data-value="7000">Kaleng</option>
                <option value="Kertas" data-time="1" data-value="3000">Kertas</option>
                <option value="Kaca" data-time="6" data-value="14000">Kaca</option>
            </select>
        </td>
        <td class="p-3">
            <input type="number" name="max_qty[]" required class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white">
        </td>
        <td class="p-3">
            <input type="number" name="time_per_kg[]" readonly class="w-full bg-white/5 rounded-xl px-4 py-3 text-cyan-300">
        </td>
        <td class="p-3">
            <input type="number" name="value_per_kg[]" readonly class="w-full bg-white/5 rounded-xl px-4 py-3 text-green-300">
        </td>
        <td class="p-3 text-center">
            <button type="button" onclick="removeRow(this)" class="text-red-400">✕</button>
        </td>
    `;
    tbody.appendChild(tr);
});

function removeRow(btn) {
    const tbody = document.getElementById('materialTableBody');
    if (tbody.children.length > 1) {
        btn.closest('tr').remove();
    }
}

function updateSpecs(selectElem) {
    const tr = selectElem.closest('tr');
    const timeInput = tr.querySelector('input[name="time_per_kg[]"]');
    const valueInput = tr.querySelector('input[name="value_per_kg[]"]');
    const selectedOption = selectElem.options[selectElem.selectedIndex];
    
    if (selectedOption.value) {
        timeInput.value = selectedOption.dataset.time;
        valueInput.value = selectedOption.dataset.value;
    }
}
</script>
{% endblock %}k %}
