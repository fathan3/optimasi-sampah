{% extends "layout.html" %}

{% block content %}
<div class="bg-white rounded-xl shadow-[0_1px_3px_0_rgba(0,0,0,0.05),0_1px_2px_0_rgba(0,0,0,0.03)] border border-gray-200">
    <div class="px-6 py-4 border-b border-gray-100">
        <h2 class="text-sm font-semibold text-gray-900">Konfigurasi Parameter</h2>
    </div>

    <form action="{{ url_for('process') }}" method="POST">
        <div class="p-6 border-b border-gray-100">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Batas Waktu Mesin Tersedia
            </label>
            <div class="relative w-full sm:w-64">
                <input type="number" name="max_time" value="60" class="w-full pl-3 pr-16 py-2 bg-white border border-gray-200 rounded-lg text-gray-900 shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-400 transition-all sm:text-sm" required>
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <span class="text-gray-400 sm:text-sm">menit</span>
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-medium text-gray-700">Detail Material Pesanan</h3>
                <button type="button" id="addRowBtn" class="text-sm font-medium text-gray-600 hover:text-gray-900 px-3 py-1.5 rounded-md hover:bg-gray-100 transition-colors flex items-center border border-gray-200 bg-white shadow-sm">
                    <svg class="w-4 h-4 mr-1.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Tambah Baris
                </button>
            </div>
            
            <div class="border border-gray-200 rounded-lg overflow-x-auto shadow-sm">
                <table class="w-full text-left border-collapse text-sm whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="px-4 py-3 font-medium text-gray-500 w-1/4">Nama Material</th>
                            <th class="px-4 py-3 font-medium text-gray-500 w-1/4">Pesanan (kg)</th>
                            <th class="px-4 py-3 font-medium text-gray-500 w-1/4">Durasi (m/kg)</th>
                            <th class="px-4 py-3 font-medium text-gray-500 w-1/4">Nilai Jual (Rp/kg)</th>
                            <th class="px-4 py-3 font-medium text-gray-500 text-center w-12"></th>
                        </tr>
                    </thead>
                    <tbody id="materialTableBody" class="divide-y divide-gray-100 bg-white">
                        <tr class="group hover:bg-gray-50/50 transition-colors">
                            <td class="p-2">
                                <select name="name[]" class="w-full px-3 py-2 bg-transparent border border-transparent hover:border-gray-200 focus:border-gray-300 focus:bg-white rounded-md focus:outline-none focus:ring-0 transition-all" required onchange="updateSpecs(this)">
                                    <option value="" disabled selected>Pilih Material</option>
                                    <option value="Besi" data-time="5" data-value="10000">Besi</option>
                                    <option value="Plastik" data-time="2" data-value="5000">Plastik</option>
                                    <option value="Kaleng" data-time="3" data-value="7000">Kaleng</option>
                                    <option value="Kertas" data-time="1" data-value="3000">Kertas</option>
                                    <option value="Kaca" data-time="6" data-value="14000">Kaca</option>
                                </select>
                            </td>
                            <td class="p-2"><input type="number" name="max_qty[]" placeholder="" class="w-full px-3 py-2 bg-transparent border border-transparent hover:border-gray-200 focus:border-gray-300 focus:bg-white rounded-md focus:outline-none focus:ring-0 transition-all" required></td>
                            <td class="p-2"><input type="number" name="time_per_kg[]" placeholder="-" class="w-full px-3 py-2 bg-gray-50 border border-transparent rounded-md focus:outline-none text-gray-500 cursor-not-allowed" required readonly></td>
                            <td class="p-2"><input type="number" name="value_per_kg[]" placeholder="-" class="w-full px-3 py-2 bg-gray-50 border border-transparent rounded-md focus:outline-none text-gray-500 cursor-not-allowed" required readonly></td>
                            <td class="p-2 text-center">
                                <button type="button" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1.5 rounded-md hover:bg-red-50" onclick="removeRow(this)">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 rounded-b-xl flex items-center justify-between">
            <button type="submit" class="bg-gray-900 hover:bg-black text-white text-sm font-medium py-2 px-5 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-colors flex items-center">
                Jalankan Optimasi
                <svg class="w-4 h-4 ml-1.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </form>
</div>

<script>
    document.getElementById('addRowBtn').addEventListener('click', function() {
        const tbody = document.getElementById('materialTableBody');
        const tr = document.createElement('tr');
        tr.className = 'group hover:bg-gray-50/50 transition-colors';
        
        tr.innerHTML = `
            <td class="p-2">
                <select name="name[]" class="w-full px-3 py-2 bg-transparent border border-transparent hover:border-gray-200 focus:border-gray-300 focus:bg-white rounded-md focus:outline-none focus:ring-0 transition-all" required onchange="updateSpecs(this)">
                    <option value="" disabled selected>Pilih Material</option>
                    <option value="Besi" data-time="5" data-value="10000">Besi</option>
                    <option value="Plastik" data-time="2" data-value="5000">Plastik</option>
                    <option value="Kaleng" data-time="3" data-value="7000">Kaleng</option>
                    <option value="Kertas" data-time="1" data-value="3000">Kertas</option>
                    <option value="Kaca" data-time="6" data-value="14000">Kaca</option>
                </select>
            </td>
            <td class="p-2"><input type="number" name="max_qty[]" placeholder="" class="w-full px-3 py-2 bg-transparent border border-transparent hover:border-gray-200 focus:border-gray-300 focus:bg-white rounded-md focus:outline-none focus:ring-0 transition-all" required></td>
            <td class="p-2"><input type="number" name="time_per_kg[]" placeholder="-" class="w-full px-3 py-2 bg-gray-50 border border-transparent rounded-md focus:outline-none text-gray-500 cursor-not-allowed" required readonly></td>
            <td class="p-2"><input type="number" name="value_per_kg[]" placeholder="-" class="w-full px-3 py-2 bg-gray-50 border border-transparent rounded-md focus:outline-none text-gray-500 cursor-not-allowed" required readonly></td>
            <td class="p-2 text-center">
                <button type="button" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1.5 rounded-md hover:bg-red-50" onclick="removeRow(this)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    function removeRow(btn) {
        const tbody = document.getElementById('materialTableBody');
        if (tbody.children.length > 1) {
            btn.closest('tr').remove();
        } else {
            alert('Harus ada setidaknya 1 material.');
        }
    }
    function updateSpecs(selectElem) {
        const tr = selectElem.closest('tr');
        const timeInput = tr.querySelector('input[name="time_per_kg[]"]');
        const valueInput = tr.querySelector('input[name="value_per_kg[]"]');
        
        const selectedOption = selectElem.options[selectElem.selectedIndex];
        if (selectedOption.value) {
            timeInput.value = selectedOption.dataset.time;
            valueInput.value = selectedOption.dataset.value;
        }
    }
</script>
{% endblock %}
